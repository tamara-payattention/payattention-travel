document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:0;padding:0;box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{background:#eef2ff}\n  @keyframes pa-travel{0%{left:4%;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:calc(96% - 12px);opacity:0}}\n  @keyframes pa-pulse{0%,100%{box-shadow:0 0 0 0 rgba(4,84,255,.35)}50%{box-shadow:0 0 0 8px rgba(4,84,255,0)}}\n<\u002Fstyle>\n<script src=\"e548f9ce-38ed-445b-9ec2-117c3e532305\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"font-family:'Hanken Grotesk',-apple-system,sans-serif;color:#10131a;background:linear-gradient(180deg,#eef2ff,#ffffff 520px);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden\">\n\n  <!-- sticky brand bar -->\n  <div style=\"position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1px solid #ebedf2\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        \n        <span style=\"font-weight:600;font-size:15px;letter-spacing:-.01em\">PayAttention<\u002Fspan>\n        <span style=\"font-family: Inter; font-size: 11px; color: #8a92a0; letter-spacing: .04em; padding-left: 8px; border-left: 1px solid #ebedf2\">&nbsp;TRAVEL<\u002Fspan>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- block 1 · hero -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:120px 32px 96px\" data-reveal=\"\">\n    <div style=\"font-family: 'IBM Plex Mono'; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: none; gap: 10px; align-items: center; margin-bottom: 26px\"><span style=\"color:#aeb6c4\">01<\u002Fspan><span style=\"width:18px;height:1px;background:#cfd5e2\"><\u002Fspan>PayAttention × Travel · pilot proposal<\u002Fdiv>\n    <h1 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(40px,6vw,68px);line-height:1.04;letter-spacing:-.02em;max-width:920px\">Verified travel bookings. You pay per completed booking — <em style=\"font-style: normal; color: #0454ff\">never per click.<\u002Fem><\u002Fh1>\n    <p style=\"font-size:19px;color:#586072;max-width:660px;margin-top:30px;line-height:1.6\">PayAttention brings travel brands new, high-intent travelers who complete a real, paid booking — a seat upgrade, a room upgrade, an e-SIM — through PayAttention's upgraded checkout. The traveler then completes a short sponsor action and the upgrade is covered. You're billed only when the booking actually happens.<\u002Fp>\n\n    <div id=\"pa-flow\" style=\"margin-top:64px;position:relative;max-width:880px;display:flex;align-items:flex-start;justify-content:space-between\">\n      <div style=\"position:absolute;top:35px;left:5%;right:5%;height:2px;background:linear-gradient(90deg,#d8e0ff,#0454ff,#d8e0ff);border-radius:2px\"><\u002Fdiv>\n      <div id=\"pa-dot\" style=\"position:absolute;top:29px;left:5%;width:14px;height:14px;border-radius:50%;background:#0454ff;box-shadow:0 0 0 4px rgba(4,84,255,.16);z-index:1\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;width:19%;text-align:center\"><div class=\"pa-tile\" style=\"width:72px;height:72px;border-radius:22px;background:#fff;border:1px solid #e6ebfb;color:#0454ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 26px rgba(4,84,255,.12);transition:border-color .25s ease,box-shadow .25s ease\"><i data-lucide=\"armchair\" style=\"width:30px;height:30px\"><\u002Fi><\u002Fdiv><span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#586072;letter-spacing:.01em;display:block;line-height:1.4;font-weight:500\">seat upgrade<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;width:19%;text-align:center\"><div class=\"pa-tile\" style=\"width:72px;height:72px;border-radius:22px;background:#fff;border:1px solid #e6ebfb;color:#0454ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 26px rgba(4,84,255,.12);transition:border-color .25s ease,box-shadow .25s ease\"><i data-lucide=\"credit-card\" style=\"width:30px;height:30px\"><\u002Fi><\u002Fdiv><span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#586072;letter-spacing:.01em;display:block;line-height:1.4;font-weight:500\">PA checkout<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;width:19%;text-align:center\"><div class=\"pa-tile\" style=\"width:72px;height:72px;border-radius:22px;background:#fff;border:1px solid #e6ebfb;color:#0454ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 26px rgba(4,84,255,.12);transition:border-color .25s ease,box-shadow .25s ease\"><i data-lucide=\"circle-check-big\" style=\"width:30px;height:30px\"><\u002Fi><\u002Fdiv><span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#586072;letter-spacing:.01em;display:block;line-height:1.4;font-weight:500\">booking completed<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;width:19%;text-align:center\"><div class=\"pa-tile\" style=\"width:72px;height:72px;border-radius:22px;background:#fff;border:1px solid #e6ebfb;color:#0454ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 10px 26px rgba(4,84,255,.12);transition:border-color .25s ease,box-shadow .25s ease\"><i data-lucide=\"circle-play\" style=\"width:30px;height:30px\"><\u002Fi><\u002Fdiv><span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#586072;letter-spacing:.01em;display:block;line-height:1.4;font-weight:500\">sponsor action<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;z-index:2;width:19%;text-align:center\"><div class=\"pa-tile pa-tile-last\" style=\"width:72px;height:72px;border-radius:22px;background:linear-gradient(160deg,#2f6bff,#0454ff);border:1px solid #0454ff;color:#fff;transition:box-shadow .25s ease;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 14px 30px rgba(4,84,255,.32)\"><i data-lucide=\"gift\" style=\"width:30px;height:30px\"><\u002Fi><\u002Fdiv><span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#0454ff;letter-spacing:.01em;display:block;line-height:1.4;font-weight:700\">upgrade covered<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- block 2 · problem -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:96px 32px;border-top:1px solid #ebedf2\" data-reveal=\"\">\n    <div style=\"font-family: Inter; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; font-weight: 500\"><span style=\"color: rgb(174, 182, 196);\">02<\u002Fspan>Problem<div><br><\u002Fdiv><\u002Fdiv>\n    <h2 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;max-width:760px\">A browser and a booker look identical at the ad click.<\u002Fh2>\n    <p style=\"font-size:18px;color:#586072;max-width:640px;margin-top:18px;line-height:1.6\">Performance ads bill you per click and per impression. You pay for travelers who compare, abandon, and never book. Coupon and deal sites bring discount-hunters who cancel. Either way, you pay before the booking exists.<\u002Fp>\n    <div style=\"display:flex;gap:20px;margin-top:44px;flex-wrap:wrap;max-width:760px\">\n      <div style=\"flex:1;min-width:240px;background:#f7f8fb;border:1px solid #ebedf2;border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(28,53,150,.06);border-top:3px solid #1f9d63\"><div style=\"font-size:38px\">🙂<\u002Fdiv><h4 style=\"font-size:16px;margin:14px 0 6px;color:#1f9d63;font-weight:600\">High-intent traveler<\u002Fh4><p style=\"font-size:14.5px;color:#586072;line-height:1.55\">Books the upgrade, takes the trip, comes back. Margin on every ancillary.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;min-width:240px;background:#f7f8fb;border:1px solid #ebedf2;border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(28,53,150,.06);border-top:3px solid #d4574e\"><div style=\"font-size:38px\">🙂<\u002Fdiv><h4 style=\"font-size:16px;margin:14px 0 6px;color:#d4574e;font-weight:600\">Comparison browser<\u002Fh4><p style=\"font-size:14.5px;color:#586072;line-height:1.55\">Clicks the ad, abandons the cart. Same click cost to you.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top: 18px; font-family: 'Manrope',sans-serif; font-weight: 800; font-style: normal; font-size: 19px; color: #3a4ff0; text-align: center\">You paid the same for both.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- block 3 · how it works -->\n  <section id=\"how\" style=\"max-width:1080px;margin:0 auto;padding:96px 32px;border-top:1px solid #ebedf2\" data-reveal=\"\">\n    <div style=\"font-family: Inter; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; font-weight: 500\"><span style=\"color:#aeb6c4\">03<\u002Fspan>How it works<\u002Fdiv>\n    <h2 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;max-width:760px\">Payment moves from the click to the completed booking.<\u002Fh2>\n    <div style=\"display:flex;gap:64px;margin-top:48px;align-items:flex-start;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:300px\">\n        <div style=\"display:flex;gap:18px;padding:18px 0;border-bottom:1px solid #ebedf2\"><div style=\"flex: none; width: 34px; height: 34px; border-radius: 50%; background: #fff; border: 1px solid #d6dcff; color: #0454ff; font-family: Inter; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center\">01<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55\">A traveler is offered a seat or room upgrade and hesitates at the full price.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;padding:18px 0;border-bottom:1px solid #ebedf2\"><div style=\"flex: none; width: 34px; height: 34px; border-radius: 50%; background: #fff; border: 1px solid #d6dcff; color: #0454ff; font-family: Inter; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center\">02<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55\">Our offer: \"Upgrade your seat — complete a short sponsor action and the upgrade is covered.\"<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;padding:18px 0;border-bottom:1px solid #ebedf2\"><div style=\"flex: none; width: 34px; height: 34px; border-radius: 50%; background: #fff; border: 1px solid #d6dcff; color: #0454ff; font-family: Inter; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center\">03<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55\">The traveler pays through PayAttention's upgraded checkout and the booking completes in your existing flow — seat upgrade, room upgrade, or e-SIM. They then complete the sponsor action and the upgrade is covered. No cash ever reaches the traveler.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;padding:18px 0;border-bottom:1px solid #ebedf2\"><div style=\"flex: none; width: 34px; height: 34px; border-radius: 50%; background: #fff; border: 1px solid #d6dcff; color: #0454ff; font-family: Inter; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center\">04<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55\">You verify on your side: booking completed → paid → not refunded. Attribution by unique code, with traveler consent.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;padding:18px 0\"><div style=\"flex: none; width: 34px; height: 34px; border-radius: 50%; background: #eef1ff; border: 1px solid #cdd6ff; color: #0454ff; font-family: Inter; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center\">05<\u002Fdiv><p style=\"font-size:15.5px;line-height:1.55\">You pay per verified booking. Cancelled or refunded → no charge.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;width:300px;margin:0 auto\">\n        <div id=\"pa-phone\" style=\"width:290px;height:592px;border:9px solid #10131a;border-radius:42px;background:#10131a;box-shadow:0 30px 70px rgba(16,19,26,.18);position:relative;overflow:hidden;margin:0 auto;cursor:pointer\">\n          <div class=\"pa-shot\" data-on=\"1\" style=\"position:absolute;inset:0;display:block;background:#fff\"><img src=\"img/screen-01.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-01.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">Upgrade offer — sponsor action makes it $0<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-shot\" style=\"position:absolute;inset:0;display:none;background:#fff\"><img src=\"img/screen-02.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-02.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">PayAttention checkout: $0 today, card saved as backup<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-shot\" style=\"position:absolute;inset:0;display:none;background:#fff\"><img src=\"img/screen-03.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-03.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">No charge today — 24h to complete the action<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-shot\" style=\"position:absolute;inset:0;display:none;background:#fff\"><img src=\"img/screen-04.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-04.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">Sponsored actions — seat upgrade as best offer<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-shot\" style=\"position:absolute;inset:0;display:none;background:#fff\"><img src=\"img/screen-05.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-05.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">Travel task: upgrade your seat, activate your e-SIM<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-shot\" style=\"position:absolute;inset:0;display:none;background:#fff\"><img src=\"img/screen-06.png\" alt=\"\" data-imgerr=\"\" style=\"width:100%;height:100%;object-fit:cover;object-position:top;display:block\"><div class=\"pa-ph\" style=\"position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:#f4f6fb;color:#8a92a0;font-family:'IBM Plex Mono';font-size:12px;text-align:center;padding:24px\"><div style=\"font-size:30px\">📱<\u002Fdiv><div>drop <b>screen-06.png<\u002Fb><br>into img/<\u002Fdiv><\u002Fdiv><div style=\"position:absolute;left:0;right:0;bottom:0;background:rgba(16,19,26,.82);color:#fff;font-size:12px;padding:10px 16px;text-align:center;line-height:1.4\">Verified → confirmed → upgrade covered<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:9px;margin-top:20px;align-items:center\">\n          <button id=\"pa-prev\" style=\"border:1px solid #e2e6ee;background:#fff;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:14px;color:#10131a\">←<\u002Fbutton>\n          <div id=\"pa-dots\" style=\"display:flex;gap:7px\">\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#0454ff;cursor:pointer\"><\u002Fspan>\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#dfe3ec;cursor:pointer\"><\u002Fspan>\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#dfe3ec;cursor:pointer\"><\u002Fspan>\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#dfe3ec;cursor:pointer\"><\u002Fspan>\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#dfe3ec;cursor:pointer\"><\u002Fspan>\n            <span class=\"pa-dot\" style=\"width:7px;height:7px;border-radius:50%;background:#dfe3ec;cursor:pointer\"><\u002Fspan>\n          <\u002Fdiv>\n          <button id=\"pa-next\" style=\"border:1px solid #e2e6ee;background:#fff;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:14px;color:#10131a\">→<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-family:'IBM Plex Mono';font-size:11px;color:#8a92a0;margin-top:10px;letter-spacing:.02em\">live product screens — tap through<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- block 4 · cohort quality -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:96px 32px;border-top:1px solid #ebedf2\" data-reveal=\"\">\n    <div style=\"font-family: Inter; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; font-weight: 500\"><span style=\"color:#aeb6c4\">04<\u002Fspan>Cohort quality<\u002Fdiv>\n    <h2 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;max-width:760px\">Why this brings bookers, not coupon-hunters.<\u002Fh2>\n    <p style=\"font-size:18px;color:#586072;max-width:640px;margin-top:18px;line-height:1.6\">Same spend, different psychology. Covering the upgrade pulls travelers who were going to book anyway — not people hunting a discount code.<\u002Fp>\n    <div style=\"display:flex;gap:20px;margin-top:44px;flex-wrap:wrap;max-width:760px\">\n      <div style=\"flex:1;min-width:250px;border:1px solid #ebedf2;border-radius:24px;padding:30px;box-shadow:0 10px 30px rgba(28,53,150,.06);background:#f7f8fb\"><span style=\"display: inline-block; font-family: Inter; font-size: 10.5px; font-weight: 600; letter-spacing: 0.03px; text-transform: uppercase; border-radius: 6px; padding: 4px 9px; margin-bottom: 16px; background: #fbeeed; color: #d4574e\">typical promo<\u002Fspan><div style=\"font-family:'Manrope',sans-serif;font-size:24px;font-weight:500;margin-bottom:10px\">\"€20 off your booking\"<\u002Fdiv><p style=\"font-size:14.5px;color:#586072;line-height:1.55\">Attracts anyone who wants €20 off. They'd have booked cheaper elsewhere, or not at all. Worse cohort, same cost.<\u002Fp><\u002Fdiv>\n      <div style=\"flex: 1; min-width: 250px; border: 1px solid #cdd6ff; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(28,53,150,.06); background: #f3f5ff; border-color: #0454ff\"><span style=\"display: inline-block; font-family: Inter; font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; border-radius: 6px; padding: 4px 9px; margin-bottom: 16px; color: #0454ff; background-color: #0454ff2c\">our offer<\u002Fspan><div style=\"font-family:'Manrope',sans-serif;font-size:24px;font-weight:500;margin-bottom:10px\">\"Your upgrade, covered for the trip\"<\u002Fdiv><p style=\"font-size:14.5px;color:#586072;line-height:1.55\">Feels bigger than a coupon (mental accounting). Costs you only when a real, paid booking completes.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;max-width:760px\">\n      <div style=\"flex:1;min-width:240px;border:1px solid #ebedf2;border-radius:22px;padding:24px;box-shadow:0 8px 24px rgba(28,53,150,.05)\"><b style=\"display:block;margin-bottom:8px;font-size:15px;color:#d4574e;text-decoration:line-through\">Public discount codes<\u002Fb><p style=\"color:#586072;font-size:14px;line-height:1.55\">No open-internet codes like \"TRAVEL20\". We never run them — they leak, get farmed, and erode your fares.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;min-width:240px;border:1px solid #ebedf2;border-radius:22px;padding:24px;box-shadow:0 8px 24px rgba(28,53,150,.05)\"><b style=\"display:block;margin-bottom:8px;font-size:15px;color:#1f9d63\">Closed partner flows only<\u002Fb><p style=\"color:#586072;font-size:14px;line-height:1.55\">The offer appears only inside approved partner apps, at the upgrade step. You approve every traffic partner and every screen where your brand appears.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- block 5 · attribution -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:96px 32px;border-top:1px solid #ebedf2\" data-reveal=\"\">\n    <div style=\"font-family: Inter; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; font-weight: 500\"><span style=\"color:#aeb6c4\">05<\u002Fspan>Attribution<\u002Fdiv>\n    <h2 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;max-width:780px\">Not a coincidence — and you can see it in your own booking events.<\u002Fh2>\n    <p style=\"font-size:18px;color:#586072;max-width:660px;margin-top:18px;line-height:1.6\">We ask the traveler to complete the booking within 24h of opening your flow with our code. Your booking engine already fires the confirmation event. Flow opened with our code + booking confirmed in the window = a traveler we brought, not one who wandered in.<\u002Fp>\n    <div style=\"margin-top:44px;max-width:620px\">\n      <!-- vertical timeline -->\n      <!-- step 1 -->\n      <div style=\"display:flex;gap:20px;align-items:center;background:#fff;border:1px solid #e9edf6;border-radius:20px;padding:22px 24px;box-shadow:0 10px 30px rgba(28,53,150,.06)\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #0454ff;color:#0454ff;box-shadow:0 8px 20px rgba(4,84,255,.14)\"><i data-lucide=\"scan-line\" style=\"width:26px;height:26px\"><\u002Fi><\u002Fdiv>\n        <div style=\"flex:1\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\"><b style=\"font-size:16px\">Hour 0<\u002Fb><span style=\"font-size:11px;font-weight:700;letter-spacing:.03em;color:#0454ff;background:#eef2ff;border-radius:999px;padding:3px 9px\">TRIGGER<\u002Fspan><\u002Fdiv>\n          <span style=\"font-size:14px;color:#586072;line-height:1.5\">Your flow opens with the PA attribution code.<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"flex:none;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#c2cad8\">01<\u002Fspan>\n      <\u002Fdiv>\n      <!-- connector 1 : the 24h window -->\n      <div style=\"display:flex;justify-content:center;position:relative;height:54px;margin-left:28px\">\n        <div style=\"width:2px;height:100%;background:linear-gradient(#0454ff,#3a6dff)\"><\u002Fdiv>\n        <div style=\"position:absolute;top:50%;left:0;transform:translateY(-50%);margin-left:18px;display:flex;align-items:center;gap:8px;background:#eef2ff;border:1px solid #cdd9ff;color:#0454ff;font-size:12px;font-weight:700;letter-spacing:.02em;padding:6px 13px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 16px rgba(4,84,255,.14)\"><i data-lucide=\"clock\" style=\"width:15px;height:15px\"><\u002Fi>≤ 24h booking window<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- step 2 -->\n      <div style=\"display:flex;gap:20px;align-items:center;background:#fff;border:1px solid #e9edf6;border-radius:20px;padding:22px 24px;box-shadow:0 10px 30px rgba(28,53,150,.06)\">\n        <div style=\"flex:none;width:56px;height:56px;border-radius:1 list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">Can travelers fake the booking?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">You define what counts — completed, paid, not refunded. Your booking engine, your rules. We accept your definition of \"verified\".<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">Are these travelers worth anything to us?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">The verified action is a paid booking — it self-selects real travelers. Minimum booking value is set by you.<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">Where does your traffic come from?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">Approved partner apps only, at the upgrade step. You approve every traffic partner and every screen where your brand appears.<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">How do you prove these bookings aren't organic?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">Your flow opened with our attribution code + booking confirmed within 24h — both events on your side. Organic browsers don't do that inside the window. Outside it, we don't bill.<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">What about refunds and cancellations?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">Not billed. We only charge on bookings that complete, pay, and hold past the refund window.<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">What data do you need from us?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">Booking confirmed/refunded per attribution code. No traveler-level data access.<\u002Fdiv><\u002Fdetails>\n      <details style=\"border-bottom:1px solid #ebedf2\"><summary style=\"padding:20px 0;font-size:16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:20px\">Who pays for the covered upgrade?<span style=\"font-family:'IBM Plex Mono';color:#0454ff;font-weight:400\">+<\u002Fspan><\u002Fsummary><div style=\"padding:0 0 20px;font-size:15px;color:#586072;max-width:640px;line-height:1.6\">We do, out of the per-booking fee, via PayAttention's checkout. No cash ever reaches the traveler.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- block 11 · contact -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:96px 32px 120px;border-top:1px solid #ebedf2\" data-reveal=\"\">\n    <div style=\"font-family: Inter; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #0454ff; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; font-weight: 500\"><span style=\"color:#aeb6c4\">11<\u002Fspan>Contact<\u002Fdiv>\n    <h2 style=\"font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;max-width:780px\">Let's agree the definition of \"verified\" — then we start.<\u002Fh2>\n    <p style=\"margin:26px 0 22px;font-size:16.5px;max-width:660px;line-height:1.6\"><b>Andrey Monastyrskiy<\u002Fb> — Co-Founder &amp; CEO. Founded and sold a B2B2C startup to X5 ($700M+ GMV).<br><\u002Fp>\n    <a href=\"mailto:andrew@payattention.now\" style=\"display:inline-flex;align-items:center;gap:10px;font-size:18px;font-weight:600;color:#fff;background:#0454ff;text-decoration:none;padding:16px 26px;border-radius:14px\" style-hover=\"background:#0344d6\">andrew@payattention.now <span style=\"font-family:'IBM Plex Mono'\">→<\u002Fspan><\u002Fa>\n  <\u002Fsection>\n\n  <footer style=\"border-top: 1px solid #ebedf2; padding: 28px; text-align: center; font-family: Inter; font-size: 11.5px; color: #8a92a0; letter-spacing: .02em; font-weight: 600\">PayAttention.now · travel pilot proposal<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // render line icons (retry until the lucide UMD script has loaded)\n    var tries = 0;\n    (function initIcons(){\n      if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); }\n      else if (tries++ < 40) { setTimeout(initIcons, 100); }\n    })();\n\n    // hero flow: dot rides the line BEHIND the tiles; the tile it reaches lights up\n    (function(){\n      var dot = document.getElementById('pa-dot');\n      var tiles = Array.prototype.slice.call(document.querySelectorAll('#pa-flow .pa-tile'));\n      if (!dot || tiles.length < 5) return;\n      var centers = [9.5, 29.75, 50, 70.25, 90.5]; // % positions of tile centers\n      var START = 5, END = 95, DUR = 5200;\n      var hot = ['0 12px 30px rgba(4,84,255,.30), 0 0 0 3px rgba(4,84,255,.20)'];\n      var coolWhite = '0 10px 26px rgba(4,84,255,.12)';\n      var coolLast = '0 14px 30px rgba(4,84,255,.32)';\n      var hotLast = '0 18px 42px rgba(4,84,255,.48), 0 0 0 4px rgba(4,84,255,.24)';\n      var t0 = null;\n      function frame(ts){\n        if (t0 === null) t0 = ts;\n        var p = ((ts - t0) % DUR) / DUR;\n        var left = START + p * (END - START);\n        dot.style.left = left + '%';\n        for (var i = 0; i < tiles.length; i++){\n          var near = Math.abs(left - centers[i]) < 7;\n          var last = i === tiles.length - 1;\n          if (last) {\n            tiles[i].style.boxShadow = near ? hotLast : coolLast;\n          } else {\n            tiles[i].style.borderColor = near ? '#0454ff' : '#e6ebfb';\n            tiles[i].style.boxShadow = near ? hot[0] : coolWhite;\n          }\n        }\n        requestAnimationFrame(frame);\n      }\n      requestAnimationFrame(frame);\n    })();\n\n    // image error -> show placeholder\n    document.querySelectorAll('[data-imgerr]').forEach(function(img){\n      img.addEventListener('error', function(){\n        img.style.display = 'none';\n        var ph = img.parentElement.querySelector('.pa-ph');\n        if (ph) ph.style.display = 'flex';\n      });\n      if (img.complete && img.naturalWidth === 0) img.dispatchEvent(new Event('error'));\n    });\n\n    // phone walkthrough\n    var shots = Array.prototype.slice.call(document.querySelectorAll('#pa-phone .pa-shot'));\n    var dots = Array.prototype.slice.call(document.querySelectorAll('.pa-dot'));\n    var cur = 0;\n    function show(i){\n      cur = (i + shots.length) % shots.length;\n      shots.forEach(function(s,k){ s.style.display = (k===cur)?'block':'none'; });\n      dots.forEach(function(d,k){ d.style.background = (k===cur)?'#0454ff':'#dfe3ec'; });\n    }\n    var next = document.getElementById('pa-next');\n    var prev = document.getElementById('pa-prev');\n    var phone = document.getElementById('pa-phone');\n    if (next) next.onclick = function(e){ e.stopPropagation(); show(cur+1); };\n    if (prev) prev.onclick = function(e){ e.stopPropagation(); show(cur-1); };\n    if (phone) phone.onclick = function(){ show(cur+1); };\n    dots.forEach(function(d,k){ d.onclick = function(e){ e.stopPropagation(); show(k); }; });\n\n    // scroll reveal — content is visible by default; we animate in as enhancement.\n    // Using WAAPI with fill:'backwards' so if the engine can't run, elements stay visible.\n    var items = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n    var vh = window.innerHeight || 800;\n    function animateIn(el){\n      if (el.__paShown) return; el.__paShown = true;\n      try {\n        el.animate(\n          [{ opacity: 0, transform: 'translateY(24px)' }, { opacity: 1, transform: 'none' }],\n          { duration: 700, easing: 'cubic-bezier(.16,.84,.44,1)', fill: 'backwards' }\n        );\n      } catch (e) {}\n    }\n    if ('IntersectionObserver' in window) {\n      var io = new IntersectionObserver(function(entries){\n        entries.forEach(function(en){\n          if (en.isIntersecting) { animateIn(en.target); io.unobserve(en.target); }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n      items.forEach(function(el){\n        // above-the-fold elements are left static (already visible); animate the rest on scroll-in\n        if (el.getBoundingClientRect().top < vh * 0.85) { el.__paShown = true; }\n        else { io.observe(el); }\n      });\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
